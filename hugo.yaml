params:
  og_image: /images/flock-camera-wide.jpg
  moto: "Unchecked Spying Erodes Your Privacy, Immigrants' Rights, and the Rule of Law"
  description: |
    Fairfax County uses automated license plate readers, including Flock.
    After widespread reports of Flock's privacy invasions and cooperation with ICE, Virginia regulated it.
    Several departments didn't follow the regulations, so our data is at risk. It's time to de-Flock.
  disable_theme_toggle: false
  newsletter_signup: true

  p1:
    heading: "What's Going On?"
    content:
      - text: |
          In 2023, the Fairfax County Police Department began using [Flock Safety License Plate Readers](https://www.ffxnow.com/2023/11/21/county-approves-funds-to-expand-fcpds-automatic-license-plate-reader-program/). 
          Unlike normal traffic cameras, automated license plate readers (ALPRs) [continually monitor](https://www.aclu.org/wp-content/uploads/publications/flock_1.pdf)
          all traffic to uniquely profile every passing vehicle and create an easily searchable history of its movements [without a warrant](https://www.cato.org/blog/schmidt-v-city-norfolk-brief-automated-license-plate-readers-commit-fourth-amendment-searches?utm_campaign=Cato_Today&utm_medium=email&utm_source=Cato_Email&utm_content=260421-Cato_Today).
          Flock gained national attention for its collection of [over 80,000 cameras](https://www.404media.co/cbp-had-access-to-more-than-80-000-flock-ai-cameras-nationwide/) being used to:
      - text: |
          - Assist [ICE's immigration crackdown](https://www.404media.co/ice-taps-into-nationwide-ai-enabled-camera-network-data-shows/).
          - [Surveil activists](https://www.eff.org/deeplinks/2025/11/how-cops-are-using-flock-safetys-alpr-network-surveil-protesters-and-activists) at No Kings protests.
          - Track a [Texas woman getting an abortion](https://www.the-independent.com/news/world/americas/crime/texas-abortion-license-plate-camera-b2760411.html).
          - Tell an [innocent citizen](https://www.404media.co/cop-used-flock-to-wrongfully-accuse-a-woman-then-refused-to-look-at-evidence-that-exonerated-her-body-camera-shows/), "You can't get a breath of fresh air...without us knowing."
      - text: |
          When FCPD started using ALPRs, it [claimed](https://fcpdnews.wordpress.com/2023/02/24/fcpd-using-flock-safety-license-plate-reader/) it 
          did "not share information to federal authorities regarding their investigations into immigration enforcement." 
      - text: |
          However, audits show Flock cameras were used in many [immigration-related cases](https://www.vpm.org/news/2025-07-07/vcij-immigration-enforcement-flock-safety-license-plate-readers-poggenklass) in Fairfax county.
          Of all immigration-related searches in Virginia, over half of them took place in Fairfax county.
          Capt. Jesse Katzman said FCPD officers did not conduct these searches but this could have happened because "We share our license plate reader system with 13 other agencies."
      - text: |
          In response to these concerns, Virginia passed a [law](https://lis.virginia.gov/bill-details/20251/HB2724) in 2025 regulating ALPR usage, limiting data sharing and retention periods.
          In 2026, the Crime Commission released [police departments' self-reported Flock usage](https://vscc.virginia.gov/2026/VSCC%20ALPR%20Report%20January%202026%20FINAL%20REVISED%20Jan%2021%202026.pdf).
          A third of departments didn't respond. Of the respondents using ALPRs:
      - text: |
          - 35% haven't promoted public awareness of ALPR usage, in violation of the law.
          - 16% don't have an ALPR policy, in violation of the law. 
          - 21% keep data longer than 21 days, in violation of the law.
          - 13% share continuous ALPR data with out-of-state agencies, in violation of the law.
          - 6% share continuous ALPR data with federal agencies, in violation of the law.
          - The report did not say which departments broke the law.
      - text: |
          Flock [admitted to lying](https://www.msn.com/en-us/politics/government/flock-admits-federal-immigration-agents-have-direct-access-to-tracking-data-despite-previous-claims/ar-AA1KQLP0) about sending data to immigration enforcement.
          Regulating Flock has failed, and its lawful usage relies on broken promises from the company itself.
      - text: |
          [Other Virginia police departments](https://www.wvtf.org/news/2026-01-15/charlottesville-and-staunton-cancel-license-plate-reading-technology) have terminated their Flock contracts. 
          It's time for Fairfax County to follow suit. 
          It's time to de-Flock.
  p2:
    heading: "Flock Doesn't Make Us Safer"
    image: "images/pages/lpr-demo.webp"
    content:
      - text: |
          Flock claims its cameras have solved 10% of reported crimes in the US.
          This comes from a study [predominantly written by Flock employees](https://www.404media.co/researcher-who-oversaw-flock-surveillance-study-now-has-concerns-about-it/),
          and its other claims about safety have faced [skepticism from academics](https://www.wired.com/story/flock-safety-license-plate-readers-crime/). 
      - text: |
          Contrary to the idea that there is "no expectation of privacy in public," the Supreme Court explicitly [stated](https://web.archive.org/web/20180623061246/https://www.law.cornell.edu/supremecourt/text/16-402)
          "A person does not surrender all Fourth Amendment protection by venturing into the public sphere."
      - text: |
          ALPRs have created many false alerts that resulted in innocent people, including children and families, [held at gunpoint](https://www.cbsnews.com/news/license-plate-readers-alpr-mistakes/).
          Officers have used Flock data to stalk their [ex-partners](https://www.themarshallproject.org/2026/03/07/police-camera-wisconsin-california-colorado).
      - text: |
          [Flock's security is abysmal](https://www.404media.co/flock-exposed-its-ai-powered-cameras-to-the-internet-we-tracked-ourselves/).
          Several cameras upload to the internet unencrypted, allowing anyone to observe people at markets, joggers on trails, and children at playgrounds.
          [Russian hackers](https://techcrunch.com/2025/11/03/lawmakers-say-stolen-police-logins-are-exposing-flock-surveillance-cameras-to-hackers/) gained access to Flock footage because Flock doesn't require basic security measures.
      - text: |
          Police departments collect Flock data without warrants. Officers have been told to "[be as vague as permissible](https://www.404media.co/police-told-to-be-as-vague-as-permissible-about-why-they-use-flock/)"
          for why they are using Flock. Virginia police have issued [thousands of searches](https://vcij.org/stories/virginia-police-search-vehicle-surveillance-data-247-why-isnt-always-clear)
          with vague, one-word justifications such as "suspect," "suspicious," or even "123." 
      - text: |
          This is unambiguous surveillance which can and has been easily abused. 
          The best way to avoid abuse is to prevent systems which provide the opportunity for such abuse.
  p3:
    heading: "Supporting Organizations"
    content:
      - text: |
          These churches, activist groups, and nonprofits agree that FCPD should terminate its contract with Flock and any other ALPR vendor.
          If you're part of an organization that would be interested in signing on, please [reach out](/contact).
          Take a stand and fight back against unchecked surveillance that hurts you and your neighbors!
    logos:
      - text: Congregation Action Network
        link: https://www.congregationactionnetwork.org/
      - text: Centreville Immigration Forum
        link: https://centrevilleimmigrationforum.org/
      - text: Libertarian Party of Northern Virginia
        link: https://www.lpnova.org/
      - text: Institute for Secure Activism
        link: https://secureactivism.org/
      - text: Herndon Friends Meeting
        link: https://herndonfriendsmeeting.org/
      - text: Little River United Church of Christ
        link: https://www.lrucc.org/
      - text: ICE out of Fairfax
        link: https://www.instagram.com/iceoutoffairfax/
      - text: Daniels Run Peace Church
        link: https://danielsrunpeacechurch.org/
      - text: Indivisible NOVA West
        link: https://www.indivisiblenovawest.org/home
  p4:
    heading: "Recent Posts"
  p5:
    heading: "Stay Informed"
    content:
      - text: "Keep up to date with efforts to stop unchecked spying in our community."
    label: "Email address"
    placeholder: "Enter your email"
    button: "Notify me"

